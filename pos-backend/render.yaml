services:
  - type: web
    name: pos-backend
    rootDir: pos-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: pos-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false  # Set manually from Upstash dashboard
      - key: CORS_ORIGIN
        sync: false  # Set to your Vercel frontend URL

databases:
  - name: pos-database
    plan: free
    databaseName: pos_system
    user: pos_user
