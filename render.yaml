services:
  - type: web
    name: pos-backend
    runtime: node
    region: oregon
    rootDir: pos-backend
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_URL
        sync: false
    healthCheckPath: /health
